name: CI

on:
  push:
  pull_request:

jobs:
  backend-and-structure:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Validate single runtime client
        run: npm run check:single-client

      - name: Run backend tests
        run: npm test -- --runInBand --passWithNoTests

[build]
  command = "npm --prefix client install && npm --prefix client run build"
  publish = "client/dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["pg", "telegraf"]

# SPA fallback: функции с собственными path (rt, api, webhook) имеют приоритет
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

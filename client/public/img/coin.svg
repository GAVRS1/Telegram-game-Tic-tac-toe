<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none" role="img" aria-label="Крутящаяся монетка">
  <title>Крутящаяся монетка</title>

  <defs>
    <linearGradient id="coinFill" x1="12" y1="12" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD95A"/>
      <stop offset="1" stop-color="#F4B400"/>
    </linearGradient>
  </defs>

  <g transform-origin="24 24">
    <animateTransform
      attributeName="transform"
      type="scale"
      values="1 1; 0.2 1; -1 1; -0.2 1; 1 1"
      keyTimes="0;0.25;0.5;0.75;1"
      dur="0.9s"
      repeatCount="indefinite"
    />

    <!-- монета -->
    <circle
      cx="24"
      cy="24"
      r="12"
      fill="url(#coinFill)"
      stroke="#F3B400"
      stroke-width="1.8"
    />

    <!-- внутренний кант -->
    <circle
      cx="24"
      cy="24"
      r="8"
      stroke-width="1.6"
    />
  </g>
</svg>